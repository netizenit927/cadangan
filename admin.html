<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel - TRINITRIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .fade-in { animation: fadeIn 0.3s ease-in; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .modal-backdrop { backdrop-filter: blur(4px); }
    </style>
  </head>

  <body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-40 bg-white border-b shadow-sm">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <img src="logo.jpeg" alt="Logo RS" class="w-10 h-10 object-contain" />
        <div class="leading-tight">
          <div class="font-semibold text-sm md:text-base">RS Premier Jatinegara</div>
          <div class="text-xs text-gray-500 tracking-wide">TRINITRIX — <span class="text-red-600 font-semibold">Admin Panel</span></div>
        </div>
        <div class="ml-auto flex items-center gap-3">
          <span id="adminEmail" class="hidden text-xs text-gray-500"></span>
          <button id="logoutBtn" class="hidden px-4 py-2 rounded-lg border bg-white text-sm font-medium hover:bg-gray-50 transition active:scale-95">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- MAIN APP -->
    <main class="pt-24 pb-10 px-4">
      <div id="app" class="max-w-6xl mx-auto hidden fade-in"></div>

      <div id="loading" class="hidden fixed inset-0 z-30 flex items-center justify-center bg-gray-100/50">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600"></div>
      </div>
    </main>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 modal-backdrop px-4">
      <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in">
        <div class="flex flex-col items-center mb-8">
          <img src="logo.jpeg" class="w-20 h-20 object-contain mb-4" />
          <h2 class="font-bold text-xl text-gray-900">Admin Panel</h2>
          <p class="text-sm text-gray-500 mt-1">Masuk sebagai <b class="text-red-600">Administrator</b></p>
        </div>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Email Admin</label>
            <input id="adminEmailInput" type="email" placeholder="admin@rspj.com"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-red-500 outline-none transition" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Password</label>
            <input id="adminPasswordInput" type="password" placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-red-500 outline-none transition" />
          </div>

          <div id="loginStatus" class="text-sm text-gray-600 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
            Masuk menggunakan akun admin.
          </div>

          <button id="loginBtn"
            class="w-full py-3.5 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition active:scale-[0.98]">
            Masuk Admin
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL TAMBAH/EDIT FORM -->
    <div id="formModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 modal-backdrop px-4">
      <div class="bg-white rounded-2xl w-full max-w-lg p-7 shadow-2xl fade-in">
        <h3 id="formModalTitle" class="text-lg font-bold mb-5 text-gray-900">Tambah Dokumen</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Kategori (Unit)</label>
            <select id="formUnitSelect"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
              <option value="">-- Pilih Kategori --</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Nama Dokumen</label>
            <input id="formName" type="text" placeholder="Contoh: Form Laporan Harian"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Link / URL</label>
            <input id="formLink" type="url" placeholder="https://docs.google.com/..."
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Urutan (Sort Order)</label>
            <input id="formSort" type="number" placeholder="1" value="1" min="1"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition" />
          </div>
          <div id="formModalStatus" class="hidden text-sm rounded-lg px-3 py-2 border"></div>
          <div class="flex gap-3 pt-1">
            <button id="formModalSave" class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 transition active:scale-95">Simpan</button>
            <button onclick="closeFormModal()" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition active:scale-95">Batal</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL TAMBAH/EDIT KATEGORI -->
    <div id="categoryModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 modal-backdrop px-4">
      <div class="bg-white rounded-2xl w-full max-w-md p-7 shadow-2xl fade-in">
        <h3 id="categoryModalTitle" class="text-lg font-bold mb-5 text-gray-900">Tambah Kategori</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1">Nama Kategori / Unit</label>
            <input id="categoryName" type="text" placeholder="Contoh: IGD, Farmasi, ICU..."
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-green-500 outline-none transition" />
          </div>
          <div id="categoryModalStatus" class="hidden text-sm rounded-lg px-3 py-2 border"></div>
          <div class="flex gap-3 pt-1">
            <button id="categoryModalSave" class="flex-1 py-3 rounded-xl bg-green-600 text-white font-bold hover:bg-green-700 transition active:scale-95">Simpan</button>
            <button onclick="closeCategoryModal()" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition active:scale-95">Batal</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CONFIRM DELETE MODAL -->
    <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 modal-backdrop px-4">
      <div class="bg-white rounded-2xl w-full max-w-sm p-7 shadow-2xl fade-in text-center">
        <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900 mb-2">Konfirmasi Hapus</h3>
        <p id="deleteMsg" class="text-gray-500 text-sm mb-6">Yakin ingin menghapus item ini?</p>
        <div class="flex gap-3">
          <button id="deleteConfirmBtn" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold hover:bg-red-700 transition active:scale-95">Hapus</button>
          <button onclick="closeDeleteModal()" class="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition active:scale-95">Batal</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function () {
      // ========================
      // SUPABASE CONFIG
      // ========================
      const supabaseUrl = "https://puoawllonvaeufvkmcrd.supabase.co";
      const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1b2F3bGxvbnZhZXVmdmttY3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MTk2NjMsImV4cCI6MjA4NTQ5NTY2M30.SRPc4HT8jbjpIsbY4SeZFPCT0CGY84sfYsNJ58UUYLk";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

      // ========================
      // STATE
      // ========================
      let units = [];        // [{id, name}]
      let forms = [];        // [{id, name, link, sort_order, unit_id, unit_name}]
      let editingFormId = null;
      let editingCategoryId = null;
      let pendingDeleteFn = null;
      let activeTab = 'documents'; // 'documents' | 'categories'

      // ========================
      // ELEMENTS
      // ========================
      const appEl        = document.getElementById('app');
      const modal        = document.getElementById('loginModal');
      const loginBtn     = document.getElementById('loginBtn');
      const logoutBtn    = document.getElementById('logoutBtn');
      const adminEmailEl = document.getElementById('adminEmail');
      const loginStatus  = document.getElementById('loginStatus');
      const loader       = document.getElementById('loading');

      // ========================
      // AUTH
      // ========================
      loginBtn.addEventListener('click', async () => {
        const email    = document.getElementById('adminEmailInput').value.trim();
        const password = document.getElementById('adminPasswordInput').value;

        if (!email || !password) {
          setLoginStatus('Email dan password wajib diisi.', true);
          return;
        }

        setLoginStatus('Memeriksa kredensial...', false);
        loginBtn.disabled = true;

        try {
          // Login via Supabase Auth
          const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });
          if (authError) throw authError;

          // Cek apakah user ini terdaftar sebagai admin
          const { data: adminRow, error: adminError } = await supabase
            .from('admin_users')
            .select('id, email, role')
            .eq('email', email)
            .single();

          if (adminError || !adminRow) {
            await supabase.auth.signOut();
            throw new Error('Akun ini tidak memiliki hak akses admin.');
          }

          setLoginStatus('Login berhasil!', false);
        } catch (err) {
          setLoginStatus(err.message, true);
          loginBtn.disabled = false;
        }
      });

      logoutBtn.addEventListener('click', async () => {
        await supabase.auth.signOut();
      });

      supabase.auth.onAuthStateChange(async (event, session) => {
        if (session) {
          // Verifikasi admin saat restore session
          const { data: adminRow } = await supabase
            .from('admin_users')
            .select('id, email, role')
            .eq('email', session.user.email)
            .single();

          if (!adminRow) {
            await supabase.auth.signOut();
            return;
          }

          modal.classList.add('hidden');
          logoutBtn.classList.remove('hidden');
          adminEmailEl.textContent = session.user.email;
          adminEmailEl.classList.remove('hidden');
          appEl.classList.remove('hidden');

          await loadData();
          renderApp();
        } else {
          appEl.classList.add('hidden');
          logoutBtn.classList.add('hidden');
          adminEmailEl.classList.add('hidden');
          modal.classList.remove('hidden');
          setLoginStatus('Masuk menggunakan akun admin.', false);
          document.getElementById('adminEmailInput').value = '';
          document.getElementById('adminPasswordInput').value = '';
          loginBtn.disabled = false;
        }
      });

      // ========================
      // DATA LOADING
      // ========================
      async function loadData() {
        showLoader(true);
        try {
          const [unitsRes, formsRes] = await Promise.all([
            supabase.from('units').select('id, name').order('name'),
            supabase.from('forms').select('id, name, link, sort_order, unit_id, units(name)').order('sort_order')
          ]);

          if (unitsRes.error) throw unitsRes.error;
          if (formsRes.error) throw formsRes.error;

          units = unitsRes.data || [];
          forms = (formsRes.data || []).map(f => ({
            ...f,
            unit_name: f.units?.name || '-'
          }));
        } catch (err) {
          alert('Gagal memuat data: ' + err.message);
        } finally {
          showLoader(false);
        }
      }

      // ========================
      // RENDER MAIN APP
      // ========================
      function renderApp() {
        appEl.innerHTML = `
          <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <h1 class="text-2xl font-bold text-gray-900">Admin Panel</h1>
              <p class="text-gray-500 text-sm">Kelola kategori unit dan dokumen laporan</p>
            </div>
            <a href="index.html" target="_blank"
              class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border bg-white text-sm font-medium hover:bg-gray-50 transition shadow-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
              Lihat Halaman Publik
            </a>
          </div>

          <!-- STATS -->
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-8">
            <div class="bg-white rounded-2xl p-5 shadow-sm border">
              <div class="text-3xl font-bold text-blue-600">${units.length}</div>
              <div class="text-sm text-gray-500 mt-1">Kategori Unit</div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border">
              <div class="text-3xl font-bold text-green-600">${forms.length}</div>
              <div class="text-sm text-gray-500 mt-1">Total Dokumen</div>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-sm border col-span-2 sm:col-span-1">
              <div class="text-3xl font-bold text-purple-600">${units.filter(u => forms.some(f => f.unit_id === u.id)).length}</div>
              <div class="text-sm text-gray-500 mt-1">Unit Aktif</div>
            </div>
          </div>

          <!-- TABS -->
          <div class="flex gap-2 mb-6 border-b">
            <button id="tabDocs" onclick="switchTab('documents')"
              class="px-5 py-3 text-sm font-semibold border-b-2 transition ${activeTab === 'documents' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}">
              Dokumen
            </button>
            <button id="tabCats" onclick="switchTab('categories')"
              class="px-5 py-3 text-sm font-semibold border-b-2 transition ${activeTab === 'categories' ? 'border-green-600 text-green-600' : 'border-transparent text-gray-500 hover:text-gray-700'}">
              Kategori Unit
            </button>
          </div>

          <div id="tabContent"></div>
        `;

        renderTabContent();
      }

      window.switchTab = function(tab) {
        activeTab = tab;
        renderApp();
      };

      function renderTabContent() {
        const container = document.getElementById('tabContent');
        if (activeTab === 'documents') {
          renderDocumentsTab(container);
        } else {
          renderCategoriesTab(container);
        }
      }

      // ========================
      // TAB: DOCUMENTS
      // ========================
      function renderDocumentsTab(container) {
        container.innerHTML = `
          <div class="flex flex-col sm:flex-row gap-3 mb-5">
            <input id="docSearch" type="text" placeholder="Cari dokumen atau unit..."
              oninput="filterDocuments(this.value)"
              class="flex-1 px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition shadow-sm" />
            <select id="docFilterUnit" onchange="filterDocuments(document.getElementById('docSearch').value)"
              class="px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition bg-white shadow-sm">
              <option value="">Semua Kategori</option>
              ${units.map(u => `<option value="${u.id}">${u.name}</option>`).join('')}
            </select>
            <button onclick="openFormModal()"
              class="px-5 py-3 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition shadow-sm whitespace-nowrap">
              + Tambah Dokumen
            </button>
          </div>
          <div id="docsTable" class="bg-white rounded-2xl shadow-sm border overflow-hidden"></div>
        `;
        renderDocsTable(forms);
      }

      window.filterDocuments = function(keyword) {
        const unitId = document.getElementById('docFilterUnit')?.value || '';
        const key    = keyword.trim().toLowerCase();
        const filtered = forms.filter(f => {
          const matchUnit = !unitId || f.unit_id === unitId;
          const matchKey  = !key || f.name.toLowerCase().includes(key) || f.unit_name.toLowerCase().includes(key);
          return matchUnit && matchKey;
        });
        renderDocsTable(filtered);
      };

      function renderDocsTable(data) {
        const container = document.getElementById('docsTable');
        if (!container) return;

        if (data.length === 0) {
          container.innerHTML = `<div class="text-center py-12 text-gray-400">Tidak ada dokumen ditemukan</div>`;
          return;
        }

        container.innerHTML = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 border-b">
                <tr>
                  <th class="text-left px-5 py-4 font-semibold text-gray-600">Nama Dokumen</th>
                  <th class="text-left px-5 py-4 font-semibold text-gray-600">Kategori</th>
                  <th class="text-left px-5 py-4 font-semibold text-gray-600 hidden md:table-cell">Link</th>
                  <th class="text-center px-5 py-4 font-semibold text-gray-600 hidden sm:table-cell">Order</th>
                  <th class="text-center px-5 py-4 font-semibold text-gray-600">Aksi</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                ${data.map(f => `
                  <tr class="hover:bg-gray-50 transition">
                    <td class="px-5 py-4 font-medium text-gray-800">${escHtml(f.name)}</td>
                    <td class="px-5 py-4">
                      <span class="px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-50 text-blue-700">${escHtml(f.unit_name)}</span>
                    </td>
                    <td class="px-5 py-4 hidden md:table-cell">
                      <a href="${escHtml(f.link)}" target="_blank" class="text-blue-500 hover:underline truncate block max-w-xs">${escHtml(f.link)}</a>
                    </td>
                    <td class="px-5 py-4 text-center text-gray-500 hidden sm:table-cell">${f.sort_order}</td>
                    <td class="px-5 py-4">
                      <div class="flex items-center justify-center gap-2">
                        <button onclick="openFormModal('${f.id}')" 
                          class="p-2 rounded-lg hover:bg-blue-50 text-blue-600 transition" title="Edit">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                          </svg>
                        </button>
                        <button onclick="confirmDeleteForm('${f.id}', '${escHtml(f.name).replace(/'/g, "\\'")}')" 
                          class="p-2 rounded-lg hover:bg-red-50 text-red-500 transition" title="Hapus">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                          </svg>
                        </button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      // ========================
      // TAB: CATEGORIES
      // ========================
      function renderCategoriesTab(container) {
        container.innerHTML = `
          <div class="flex flex-col sm:flex-row gap-3 mb-5">
            <input id="catSearch" type="text" placeholder="Cari kategori..."
              oninput="filterCategories(this.value)"
              class="flex-1 px-4 py-3 rounded-xl border focus:ring-2 focus:ring-green-500 outline-none transition shadow-sm" />
            <button onclick="openCategoryModal()"
              class="px-5 py-3 rounded-xl bg-green-600 text-white font-semibold hover:bg-green-700 transition shadow-sm whitespace-nowrap">
              + Tambah Kategori
            </button>
          </div>
          <div id="catsTable" class="bg-white rounded-2xl shadow-sm border overflow-hidden"></div>
        `;
        renderCatsTable(units);
      }

      window.filterCategories = function(keyword) {
        const key = keyword.trim().toLowerCase();
        const filtered = units.filter(u => u.name.toLowerCase().includes(key));
        renderCatsTable(filtered);
      };

      function renderCatsTable(data) {
        const container = document.getElementById('catsTable');
        if (!container) return;

        if (data.length === 0) {
          container.innerHTML = `<div class="text-center py-12 text-gray-400">Tidak ada kategori ditemukan</div>`;
          return;
        }

        container.innerHTML = `
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 border-b">
                <tr>
                  <th class="text-left px-5 py-4 font-semibold text-gray-600">Nama Kategori / Unit</th>
                  <th class="text-center px-5 py-4 font-semibold text-gray-600">Jumlah Dokumen</th>
                  <th class="text-center px-5 py-4 font-semibold text-gray-600">Aksi</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                ${data.map(u => {
                  const docCount = forms.filter(f => f.unit_id === u.id).length;
                  return `
                    <tr class="hover:bg-gray-50 transition">
                      <td class="px-5 py-4 font-medium text-gray-800">${escHtml(u.name)}</td>
                      <td class="px-5 py-4 text-center">
                        <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${docCount > 0 ? 'bg-green-50 text-green-700' : 'bg-gray-100 text-gray-500'}">${docCount} dokumen</span>
                      </td>
                      <td class="px-5 py-4">
                        <div class="flex items-center justify-center gap-2">
                          <button onclick="openCategoryModal('${u.id}')"
                            class="p-2 rounded-lg hover:bg-blue-50 text-blue-600 transition" title="Edit">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                          </button>
                          <button onclick="confirmDeleteCategory('${u.id}', '${escHtml(u.name).replace(/'/g, "\\'")}')"
                            class="p-2 rounded-lg hover:bg-red-50 text-red-500 transition ${docCount > 0 ? 'opacity-40 cursor-not-allowed' : ''}"
                            title="${docCount > 0 ? 'Hapus dokumen di kategori ini terlebih dahulu' : 'Hapus'}"
                            ${docCount > 0 ? 'disabled' : ''}>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                          </button>
                        </div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      // ========================
      // FORM DOCUMENT MODAL
      // ========================
      window.openFormModal = function(formId = null) {
        editingFormId = formId;
        const modalEl = document.getElementById('formModal');
        const titleEl = document.getElementById('formModalTitle');
        const saveBtn = document.getElementById('formModalSave');
        const statusEl = document.getElementById('formModalStatus');

        // Populate unit options
        const unitSelect = document.getElementById('formUnitSelect');
        unitSelect.innerHTML = '<option value="">-- Pilih Kategori --</option>' +
          units.map(u => `<option value="${u.id}">${escHtml(u.name)}</option>`).join('');

        statusEl.classList.add('hidden');

        if (formId) {
          const form = forms.find(f => f.id === formId);
          if (form) {
            titleEl.textContent = 'Edit Dokumen';
            document.getElementById('formName').value = form.name;
            document.getElementById('formLink').value = form.link;
            document.getElementById('formSort').value = form.sort_order;
            unitSelect.value = form.unit_id;
          }
        } else {
          titleEl.textContent = 'Tambah Dokumen';
          document.getElementById('formName').value = '';
          document.getElementById('formLink').value = '';
          document.getElementById('formSort').value = '1';
          unitSelect.value = '';
        }

        saveBtn.onclick = saveForm;
        modalEl.classList.remove('hidden');
      };

      window.closeFormModal = function() {
        document.getElementById('formModal').classList.add('hidden');
        editingFormId = null;
      };

      async function saveForm() {
        const name       = document.getElementById('formName').value.trim();
        const link       = document.getElementById('formLink').value.trim();
        const sort_order = parseInt(document.getElementById('formSort').value) || 1;
        const unit_id    = document.getElementById('formUnitSelect').value;
        const statusEl   = document.getElementById('formModalStatus');

        if (!unit_id) { showModalStatus(statusEl, 'Pilih kategori terlebih dahulu.', true); return; }
        if (!name)    { showModalStatus(statusEl, 'Nama dokumen wajib diisi.', true); return; }
        if (!link)    { showModalStatus(statusEl, 'Link wajib diisi.', true); return; }

        showModalStatus(statusEl, 'Menyimpan...', false);

        try {
          if (editingFormId) {
            const { error } = await supabase.from('forms')
              .update({ name, link, sort_order, unit_id })
              .eq('id', editingFormId);
            if (error) throw error;
          } else {
            const { error } = await supabase.from('forms')
              .insert({ name, link, sort_order, unit_id });
            if (error) throw error;
          }

          closeFormModal();
          await loadData();
          renderApp();
        } catch (err) {
          showModalStatus(statusEl, 'Gagal menyimpan: ' + err.message, true);
        }
      }

      // ========================
      // CATEGORY MODAL
      // ========================
      window.openCategoryModal = function(categoryId = null) {
        editingCategoryId = categoryId;
        const modalEl  = document.getElementById('categoryModal');
        const titleEl  = document.getElementById('categoryModalTitle');
        const saveBtn  = document.getElementById('categoryModalSave');
        const statusEl = document.getElementById('categoryModalStatus');

        statusEl.classList.add('hidden');

        if (categoryId) {
          const unit = units.find(u => u.id === categoryId);
          if (unit) {
            titleEl.textContent = 'Edit Kategori';
            document.getElementById('categoryName').value = unit.name;
          }
        } else {
          titleEl.textContent = 'Tambah Kategori';
          document.getElementById('categoryName').value = '';
        }

        saveBtn.onclick = saveCategory;
        modalEl.classList.remove('hidden');
      };

      window.closeCategoryModal = function() {
        document.getElementById('categoryModal').classList.add('hidden');
        editingCategoryId = null;
      };

      async function saveCategory() {
        const name     = document.getElementById('categoryName').value.trim();
        const statusEl = document.getElementById('categoryModalStatus');

        if (!name) { showModalStatus(statusEl, 'Nama kategori wajib diisi.', true); return; }

        showModalStatus(statusEl, 'Menyimpan...', false);

        try {
          if (editingCategoryId) {
            const { error } = await supabase.from('units')
              .update({ name })
              .eq('id', editingCategoryId);
            if (error) throw error;
          } else {
            const { error } = await supabase.from('units').insert({ name });
            if (error) throw error;
          }

          closeCategoryModal();
          await loadData();
          renderApp();
        } catch (err) {
          showModalStatus(statusEl, 'Gagal menyimpan: ' + err.message, true);
        }
      }

      // ========================
      // DELETE
      // ========================
      window.confirmDeleteForm = function(formId, formName) {
        document.getElementById('deleteMsg').textContent = `Yakin hapus dokumen "${formName}"? Aksi ini tidak bisa dibatalkan.`;
        pendingDeleteFn = async () => {
          const { error } = await supabase.from('forms').delete().eq('id', formId);
          if (error) throw error;
        };
        document.getElementById('deleteModal').classList.remove('hidden');
        document.getElementById('deleteConfirmBtn').onclick = executeDelete;
      };

      window.confirmDeleteCategory = function(catId, catName) {
        document.getElementById('deleteMsg').textContent = `Yakin hapus kategori "${catName}"?`;
        pendingDeleteFn = async () => {
          const { error } = await supabase.from('units').delete().eq('id', catId);
          if (error) throw error;
        };
        document.getElementById('deleteModal').classList.remove('hidden');
        document.getElementById('deleteConfirmBtn').onclick = executeDelete;
      };

      async function executeDelete() {
        if (!pendingDeleteFn) return;
        try {
          showLoader(true);
          closeDeleteModal();
          await pendingDeleteFn();
          pendingDeleteFn = null;
          await loadData();
          renderApp();
        } catch (err) {
          alert('Gagal menghapus: ' + err.message);
        } finally {
          showLoader(false);
        }
      }

      window.closeDeleteModal = function() {
        document.getElementById('deleteModal').classList.add('hidden');
        pendingDeleteFn = null;
      };

      // ========================
      // HELPERS
      // ========================
      function setLoginStatus(msg, isError) {
        loginStatus.textContent = msg;
        loginStatus.className = `text-sm rounded-lg px-3 py-2 border ${isError
          ? 'text-red-600 bg-red-50 border-red-200'
          : 'text-gray-600 bg-gray-50 border-gray-200'}`;
      }

      function showModalStatus(el, msg, isError) {
        el.textContent = msg;
        el.className = `text-sm rounded-lg px-3 py-2 border ${isError
          ? 'text-red-600 bg-red-50 border-red-200'
          : 'text-blue-600 bg-blue-50 border-blue-200'}`;
        el.classList.remove('hidden');
      }

      function showLoader(show) {
        loader.classList.toggle('hidden', !show);
      }

      function escHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

    })();
    </script>
  </body>
</html>
