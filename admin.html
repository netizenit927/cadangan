<!DOCTYPE html>

<!-- ============================================================
     CONFIG & SCRIPT
     ============================================================ -->
<script>
  // ⚠️  GANTI dua baris ini dengan URL dan ANON KEY Supabase project kamu
  const SUPABASE_URL  = 'https://unzbfqobkrfzdsiahbju.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuemJmcW9ia3JmemRzaWFoYmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjU1NTksImV4cCI6MjA5NjU0MTU1OX0.cxkJbokUdsmRyQGNS4xDRNx7XUf319PXlzOLdzfC0kM';

  const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ============================================================
  // SESSION ADMIN
  // ============================================================
  const ADMIN_SESSION_KEY = 'trx_admin_session';

  function getAdminSession() {
    try { return JSON.parse(sessionStorage.getItem(ADMIN_SESSION_KEY) || 'null'); }
    catch { return null; }
  }
  function setAdminSession(data) { sessionStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(data)); }
  function clearAdminSession() { sessionStorage.removeItem(ADMIN_SESSION_KEY); }

  // ============================================================
  // PASSWORD TOGGLE
  // ============================================================
  function togglePassVis() {
    const inp = document.getElementById('loginPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  // ============================================================
  // LOGIN ADMIN
  // ============================================================
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const errBox   = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    const spinner  = document.getElementById('loginSpinner');

    errBox.classList.add('hidden');
    btn.disabled = true;
    spinner.classList.remove('hidden');

    try {
      const { data: users, error } = await _supa
        .from('admin_users')
        .select('id, username, password_hash, display_name, is_active')
        .eq('username', username)
        .eq('is_active', true)
        .limit(1);

      if (error) throw new Error('Gagal terhubung ke server.');
      if (!users || users.length === 0) throw new Error('Username atau password salah.');

      const valid = await bcrypt.compare(password, users[0].password_hash);
      if (!valid) throw new Error('Username atau password salah.');

      setAdminSession({ id: users[0].id, username: users[0].username, displayName: users[0].display_name });
      showAdminPage();

    } catch (err) {
      errBox.textContent = err.message;
      errBox.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
    }
  });

  // ============================================================
  // LOGOUT
  // ============================================================
  function adminLogout() {
    clearAdminSession();
    document.getElementById('adminPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }

  // ============================================================
  // TAMPILKAN ADMIN PAGE
  // ============================================================
  function showAdminPage() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('adminPage').classList.remove('hidden');
    loadData();
  }

  // ============================================================
  // DATA STATE
  // ============================================================
  let ROOMS = [];
  let DOCS  = [];

  // ============================================================
  // LOAD DATA
  // ============================================================
  async function loadData() {
    try {
      const [roomsRes, docsRes] = await Promise.all([
        _supa.from('rooms').select('*').order('name', { ascending: true }),
        _supa.from('documents').select('*').order('sort_order', { ascending: true })
      ]);

      if (roomsRes.error) throw roomsRes.error;
      if (docsRes.error) throw docsRes.error;

      ROOMS = roomsRes.data || [];
      DOCS  = docsRes.data  || [];

      updateStats();
      populateRoomSelect();
      renderRoomList();

    } catch (err) {
      showToast('Gagal memuat data: ' + err.message, 'error');
    }
  }

  // ============================================================
  // UPDATE STATS
  // ============================================================
  function updateStats() {
    const forms  = DOCS.filter(d => d.category === 'form').length;
    const excels = DOCS.filter(d => d.category === 'excel').length;

    document.getElementById('statRooms').outerHTML  = `<div id="statRooms" class="text-2xl font-bold text-slate-800">${ROOMS.length}</div>`;
    document.getElementById('statForms').outerHTML  = `<div id="statForms" class="text-2xl font-bold text-blue-600">${forms}</div>`;
    document.getElementById('statExcels').outerHTML = `<div id="statExcels" class="text-2xl font-bold text-emerald-600">${excels}</div>`;
  }

  // ============================================================
  // POPULATE SELECT KATEGORI
  // ============================================================
  function populateRoomSelect() {
    const sel = document.getElementById('docRoomId');
    sel.innerHTML = `<option value="">-- Pilih Kategori --</option>` +
      ROOMS.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
  }

  // ============================================================
  // RENDER ROOM LIST
  // ============================================================
  function renderRoomList(filter = '') {
    const q = filter.toLowerCase().trim();
    const list = document.getElementById('roomList');
    const noMatch = document.getElementById('noMatch');

    let anyVisible = false;
    let html = '';

    ROOMS.forEach(room => {
      const docs = DOCS.filter(d => d.room_id === room.id)
        .sort((a, b) => {
          if (a.category !== b.category) return a.category === 'excel' ? -1 : 1;
          return (a.sort_order || 0) - (b.sort_order || 0);
        });

      const fc = docs.filter(d => d.category !== 'excel').length;
      const ec = docs.filter(d => d.category === 'excel').length;

      const nameMatch  = room.name.toLowerCase().includes(q);
      const docMatches = docs.filter(d => !q || d.title.toLowerCase().includes(q) || nameMatch);

      if (q && !nameMatch && docMatches.length === 0) return;
      anyVisible = true;

      const displayDocs = q && !nameMatch ? docMatches : docs;

      html += `
        <div class="border border-slate-200 rounded-2xl overflow-hidden">
          <!-- Header -->
          <div class="bg-slate-50 px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
            <div class="min-w-0">
              <div class="font-semibold text-slate-800 truncate">${esc(room.name)}</div>
              ${room.description ? `<div class="text-xs text-slate-500 truncate">${esc(room.description)}</div>` : ''}
            </div>
            <div class="flex items-center gap-2 flex-wrap shrink-0">
              <span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-medium">${fc} Form</span>
              <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-medium">${ec} Excel</span>
              <button onclick="openEditRoomModal('${room.id}','${escAttr(room.name)}','${escAttr(room.description || '')}')"
                      class="text-xs px-3 py-1.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white transition">Edit</button>
              <button onclick="confirmDelete('room','${room.id}','${escAttr(room.name)}')"
                      class="text-xs px-3 py-1.5 rounded-lg bg-red-500 hover:bg-red-600 text-white transition">Hapus</button>
            </div>
          </div>

          <!-- Docs -->
          ${displayDocs.length === 0 ? `<div class="px-4 py-3 text-xs text-slate-400 italic">Belum ada link.</div>` :
            `<div class="divide-y divide-slate-100">` +
            displayDocs.map(doc => {
              const isExcel = doc.category === 'excel';
              return `
                <div class="px-4 py-3 flex items-start justify-between gap-3">
                  <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-2 flex-wrap">
                      <span class="text-xs px-2 py-0.5 rounded-full font-medium shrink-0 ${isExcel ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">${isExcel ? 'EXCEL' : 'FORM'}</span>
                      <span class="font-medium text-sm text-slate-700 truncate">${esc(doc.title)}</span>
                    </div>
                    <a href="${esc(doc.url)}" target="_blank" rel="noopener"
                       class="text-xs text-slate-400 hover:text-blue-600 break-all mt-0.5 block line-clamp-1">${esc(doc.url)}</a>
                  </div>
                  <div class="flex gap-2 shrink-0">
                    <button onclick="openEditDocModal('${doc.id}','${escAttr(doc.title)}','${escAttr(doc.url)}','${doc.category}')"
                            class="text-xs px-3 py-1.5 rounded-lg bg-blue-500 hover:bg-blue-600 text-white transition">Edit</button>
                    <button onclick="confirmDelete('doc','${doc.id}','${escAttr(doc.title)}')"
                            class="text-xs px-3 py-1.5 rounded-lg bg-red-500 hover:bg-red-600 text-white transition">Hapus</button>
                  </div>
                </div>`;
            }).join('') +
            `</div>`
          }
        </div>`;
    });

    list.innerHTML = html || '';
    noMatch.classList.toggle('hidden', anyVisible || !q);
  }

  // ============================================================
  // TAMBAH KATEGORI
  // ============================================================
  async function addRoom() {
    const name = document.getElementById('newRoomName').value.trim();
    const desc = document.getElementById('newRoomDesc').value.trim();
    if (!name) { showToast('Nama kategori tidak boleh kosong', 'error'); return; }

    const { error } = await _supa.from('rooms').insert({ name, description: desc, sort_order: ROOMS.length });
    if (error) { showToast('Gagal: ' + error.message, 'error'); return; }

    document.getElementById('newRoomName').value = '';
    document.getElementById('newRoomDesc').value = '';
    showToast(`Kategori "${name}" berhasil ditambahkan`);
    await loadData();
  }

  // ============================================================
  // TAMBAH LINK
  // ============================================================
  async function addDoc() {
    const roomId   = document.getElementById('docRoomId').value;
    const title    = document.getElementById('docTitle').value.trim();
    const url      = document.getElementById('docUrl').value.trim();
    const category = document.getElementById('docCategory').value;

    if (!roomId) { showToast('Pilih kategori terlebih dahulu', 'error'); return; }
    if (!title)  { showToast('Judul link tidak boleh kosong', 'error'); return; }
    if (!url)    { showToast('URL tidak boleh kosong', 'error'); return; }

    const maxOrder = Math.max(0, ...DOCS.filter(d => d.room_id === roomId).map(d => d.sort_order || 0));

    const { error } = await _supa.from('documents').insert({
      room_id: roomId, title, url, category, sort_order: maxOrder + 1
    });

    if (error) { showToast('Gagal: ' + error.message, 'error'); return; }

    document.getElementById('docTitle').value = '';
    document.getElementById('docUrl').value   = '';
    showToast(`Link "${title}" berhasil ditambahkan`);
    await loadData();
  }

  // ============================================================
  // MODAL EDIT KATEGORI
  // ============================================================
  function openEditRoomModal(id, name, desc) {
    document.getElementById('editRoomId').value   = id;
    document.getElementById('editRoomName').value = name;
    document.getElementById('editRoomDesc').value = desc;
    document.getElementById('editRoomModal').classList.remove('hidden');
  }

  async function saveEditRoom() {
    const id   = document.getElementById('editRoomId').value;
    const name = document.getElementById('editRoomName').value.trim();
    const desc = document.getElementById('editRoomDesc').value.trim();
    if (!name) { showToast('Nama tidak boleh kosong', 'error'); return; }

    const { error } = await _supa.from('rooms').update({ name, description: desc }).eq('id', id);
    if (error) { showToast('Gagal: ' + error.message, 'error'); return; }

    closeModal('editRoomModal');
    showToast('Kategori berhasil diperbarui');
    await loadData();
  }

  // ============================================================
  // MODAL EDIT LINK
  // ============================================================
  function openEditDocModal(id, title, url, category) {
    document.getElementById('editDocId').value       = id;
    document.getElementById('editDocTitle').value    = title;
    document.getElementById('editDocUrl').value      = url;
    document.getElementById('editDocCategory').value = category;
    document.getElementById('editDocModal').classList.remove('hidden');
  }

  async function saveEditDoc() {
    const id       = document.getElementById('editDocId').value;
    const title    = document.getElementById('editDocTitle').value.trim();
    const url      = document.getElementById('editDocUrl').value.trim();
    const category = document.getElementById('editDocCategory').value;
    if (!title || !url) { showToast('Judul dan URL tidak boleh kosong', 'error'); return; }

    const { error } = await _supa.from('documents').update({ title, url, category }).eq('id', id);
    if (error) { showToast('Gagal: ' + error.message, 'error'); return; }

    closeModal('editDocModal');
    showToast('Link berhasil diperbarui');
    await loadData();
  }

  // ============================================================
  // MODAL KONFIRMASI HAPUS
  // ============================================================
  let _pendingDelete = null;

  function confirmDelete(type, id, name) {
    _pendingDelete = { type, id };
    const msg = type === 'room'
      ? `Hapus kategori "<strong>${esc(name)}</strong>"? Semua link di dalamnya ikut terhapus.`
      : `Hapus link "<strong>${esc(name)}</strong>"?`;
    document.getElementById('confirmMsg').innerHTML = msg;
    document.getElementById('confirmModal').classList.remove('hidden');
    document.getElementById('confirmYes').onclick = executeDelete;
  }

  async function executeDelete() {
    if (!_pendingDelete) return;
    const { type, id } = _pendingDelete;
    _pendingDelete = null;
    closeModal('confirmModal');

    const table = type === 'room' ? 'rooms' : 'documents';
    const { error } = await _supa.from(table).delete().eq('id', id);
    if (error) { showToast('Gagal: ' + error.message, 'error'); return; }

    showToast(type === 'room' ? 'Kategori berhasil dihapus' : 'Link berhasil dihapus');
    await loadData();
  }

  // ============================================================
  // CLOSE MODAL
  // ============================================================
  function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
  }

  // Close modal on backdrop click
  ['editRoomModal','editDocModal','confirmModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', function(e) {
      if (e.target === this) closeModal(id);
    });
  });

  // ============================================================
  // LIVE SEARCH
  // ============================================================
  document.getElementById('adminSearch').addEventListener('input', function() {
    renderRoomList(this.value);
  });

  // ============================================================
  // TOAST
  // ============================================================
  let toastTimer = null;
  function showToast(msg, type = 'success') {
    const toast    = document.getElementById('toast');
    const icon     = document.getElementById('toastIcon');
    const msgEl    = document.getElementById('toastMsg');
    msgEl.textContent = msg;

    if (type === 'success') {
      toast.className = 'fixed top-4 right-4 z-50 bg-white border border-emerald-200 shadow-lg rounded-xl px-4 py-3 text-sm flex items-center gap-2 max-w-sm text-slate-700';
      icon.innerHTML  = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
      icon.classList.value = 'w-4 h-4 text-emerald-600 shrink-0';
    } else {
      toast.className = 'fixed top-4 right-4 z-50 bg-white border border-red-200 shadow-lg rounded-xl px-4 py-3 text-sm flex items-center gap-2 max-w-sm text-slate-700';
      icon.innerHTML  = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>';
      icon.classList.value = 'w-4 h-4 text-red-600 shrink-0';
    }

    toast.classList.remove('hidden');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.add('hidden'), 3500);
  }

  // ============================================================
  // UTILITIES
  // ============================================================
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(str) {
    return String(str || '').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  // ============================================================
  // INIT
  // ============================================================
  (function init() {
    const session = getAdminSession();
    if (session) showAdminPage();
  })();
</script>
</body>
</html>
