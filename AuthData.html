<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>TRINITRIX - RS Premier Jatinegara</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 text-gray-800">
    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-40 bg-white border-b">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <img src="logo.jpeg" alt="Logo RS" class="w-10 h-10 object-contain" />
        <div class="leading-tight">
          <div class="font-semibold text-sm md:text-base">
            RS Premier Jatinegara
          </div>
          <div class="text-xs text-gray-500 tracking-wide">TRINITRIX</div>
        </div>
      </div>
    </nav>

    <!-- APP -->
    <main class="pt-20 px-4">
      <div id="app" class="max-w-5xl mx-auto hidden"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        /* =====================
           DATA
        ===================== */
        let data = {};
        let unitsList = [];

        const app = document.getElementById("app");

        /* =====================
           HELPER
        ===================== */
        function formatUnitName(text) {
          return text
            .replace(/([a-z])([A-Z])/g, "$1 $2")
            .replace(/([a-zA-Z])(\d)/g, "$1 $2");
        }

        const supabaseUrl = "https://puoawllonvaeufvkmcrd.supabase.co";
        const supabaseAnonKey =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1b2F3bGxvbnZhZXVmdmttY3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MTk2NjMsImV4cCI6MjA4NTQ5NTY2M30.SRPc4HT8jbjpIsbY4SeZFPCT0CGY84sfYsNJ58UUYLk";

        if (!window.supabase) {
          return;
        }

        if (
          supabaseUrl.startsWith("REPLACE_") ||
          supabaseAnonKey.startsWith("REPLACE_")
        ) {
          return;
        }

        const supabase = window.supabase.createClient(
          supabaseUrl,
          supabaseAnonKey,
        );

        async function fetchUnits() {
          const sessionRes = await supabase.auth.getSession();
          if (!sessionRes.data.session) {
            window.location.href = "index.html";
            return;
          }

          const { data: units, error } = await supabase
            .from("units")
            .select("id,name,forms:forms(id,name,link,sort_order)")
            .order("name", { ascending: true })
            .order("sort_order", { foreignTable: "forms", ascending: true });

          if (error) {
            return;
          }

          data = (units || []).reduce((acc, unit) => {
            acc[unit.name] = unit.forms || [];
            return acc;
          }, {});
          unitsList = Object.keys(data);
        }

        /* =====================
           HOME + SEARCH
        ===================== */
        function renderHome() {
          app.innerHTML = `
            <input
              id="searchInput"
              type="text"
              placeholder="Cari unit kerja..."
              class="w-full mb-6 px-4 py-3 rounded-xl border
                     focus:outline-none focus:ring"
            />

            <div
              id="results"
              class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
            ></div>
          `;

          document
            .getElementById("searchInput")
            .addEventListener("input", handleSearch);

          renderResults("");
        }

        function handleSearch(e) {
          renderResults(e.target.value);
        }

        function renderResults(keyword) {
          const key = keyword.trim().toLowerCase();
          const units = unitsList.filter((unit) =>
            unit.toLowerCase().includes(key),
          );

          const container = document.getElementById("results");

          if (units.length === 0) {
            container.innerHTML = `
              <div class="text-gray-500 text-sm">
                Unit tidak ditemukan
              </div>
            `;
            return;
          }

          container.innerHTML = units
            .map(
              (unit) => `
              <div
                onclick="renderUnit('${unit}')"
                class="cursor-pointer rounded-2xl p-6
                       bg-white border
                       hover:shadow-md transition"
              >
                <div class="text-lg font-semibold">
                  ${formatUnitName(unit)}
                </div>
              </div>
            `,
            )
            .join("");
        }

        /* =====================
           UNIT PAGE
        ===================== */
        function renderUnit(unit) {
          app.innerHTML = `
            <div class="flex items-center gap-3 mb-4">
              <button
                onclick="renderHome()"
                class="w-10 h-10 flex items-center justify-center
                       rounded-full border bg-white
                       hover:bg-gray-100 transition"
                aria-label="Kembali"
              >
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-5 h-5 text-gray-700"
                     fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M15 19l-7-7 7-7" />
                </svg>
              </button>

              <h1 class="text-xl font-semibold">
                ${formatUnitName(unit)}
              </h1>
            </div>

            <div class="space-y-3">
              ${(data[unit] || [])
                .map(
                  (f) => `
                <a
                  href="${f.link}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="block p-4 rounded-xl bg-white
                         border hover:shadow transition"
                >
                  ${f.name}
                </a>
              `,
                )
                .join("")}
            </div>
          `;
        }

        (async () => {
          await fetchUnits();
          app.classList.remove("hidden");
          renderHome();
        })();
      })();
    </script>
  </body>
</html>
