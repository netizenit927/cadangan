<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>TRINITRIX - RS Premier Jatinegara</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 text-gray-800">
    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-40 bg-white border-b">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <img src="logo.jpeg" alt="Logo RS" class="w-10 h-10 object-contain" />
        <div class="leading-tight">
          <div class="font-semibold text-sm md:text-base">
            RS Premier Jatinegara
          </div>
          <div class="text-xs text-gray-500 tracking-wide">TRINITRIX</div>
        </div>
        <div class="ml-auto">
          <button
            id="logoutBtn"
            class="hidden px-4 py-2 rounded-lg border bg-white text-sm hover:bg-gray-100 transition"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- APP -->
    <main class="pt-20 px-4">
      <div id="app" class="max-w-5xl mx-auto hidden"></div>
    </main>

    <!-- LOGIN MODAL -->
    <div
      id="loginModal"
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-4"
    >
      <div class="bg-white rounded-2xl w-full max-w-md p-7 shadow-xl">
        <div class="flex flex-col items-center mb-6">
          <img src="logo.jpeg" class="w-16 h-16 object-contain mb-3" />
          <div class="font-semibold text-lg">RS Premier Jatinegara</div>
          <div class="text-sm text-gray-500 text-center">
            Selamat Datang di <b>TRINITRIX</b>
          </div>
        </div>

        <div class="space-y-4">
          <input
            id="email"
            type="email"
            placeholder="Email"
            class="w-full px-4 py-2.5 rounded-lg border"
          />
          <input
            id="password"
            type="password"
            placeholder="Password"
            class="w-full px-4 py-2.5 rounded-lg border"
          />

          <div
            id="statusMsg"
            class="text-sm text-gray-600 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2"
          >
            Silakan login untuk melanjutkan.
          </div>

          <div
            id="errorMsg"
            class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"
          >
            Login gagal. Coba lagi.
          </div>

          <button
            id="loginBtn"
            class="w-full py-2.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 transition"
          >
            Login
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      /* =====================
         DATA
      ===================== */
      let data = {};
      let unitsList = [];

      const app = document.getElementById("app");
      const modal = document.getElementById("loginModal");
      const errorMsg = document.getElementById("errorMsg");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const statusMsg = document.getElementById("statusMsg");

      const supabaseUrl = "REPLACE_WITH_SUPABASE_URL";
      const supabaseAnonKey = "REPLACE_WITH_SUPABASE_ANON_KEY";
      const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

      /* =====================
         HELPER
      ===================== */
      function formatUnitName(text) {
        return text
          .replace(/([a-z])([A-Z])/g, "$1 $2")
          .replace(/([a-zA-Z])(\d)/g, "$1 $2");
      }

      function setStatus(message, isError) {
        statusMsg.textContent = message;
        statusMsg.classList.toggle("text-red-600", !!isError);
        statusMsg.classList.toggle("bg-red-50", !!isError);
        statusMsg.classList.toggle("border-red-200", !!isError);
        statusMsg.classList.toggle("text-gray-600", !isError);
        statusMsg.classList.toggle("bg-gray-50", !isError);
        statusMsg.classList.toggle("border-gray-200", !isError);
      }

      async function fetchUnits() {
        const sessionRes = await supabase.auth.getSession();
        if (!sessionRes.data.session) {
          throw new Error("Belum login.");
        }

        const { data: units, error } = await supabase
          .from("units")
          .select("id,name,forms:forms(id,name,link,sort_order)")
          .order("name", { ascending: true })
          .order("sort_order", { foreignTable: "forms", ascending: true });

        if (error) {
          throw new Error(error.message || "Gagal mengambil data.");
        }

        data = (units || []).reduce((acc, unit) => {
          acc[unit.name] = unit.forms || [];
          return acc;
        }, {});
        unitsList = Object.keys(data);
      }

      async function onLogin() {
        errorMsg.classList.add("hidden");
        setStatus("Mengambil data...", false);
        try {
          await fetchUnits();
          modal.classList.add("hidden");
          app.classList.remove("hidden");
          logoutBtn.classList.remove("hidden");
          renderHome();
        } catch (err) {
          errorMsg.classList.remove("hidden");
          setStatus(err.message || "Login gagal.", true);
        }
      }

      function onLogout() {
        app.classList.add("hidden");
        modal.classList.remove("hidden");
        logoutBtn.classList.add("hidden");
        setStatus("Silakan login untuk melanjutkan.", false);
      }

      /* =====================
         HOME + SEARCH
      ===================== */
      function renderHome() {
        app.innerHTML = `
          <input
            id="searchInput"
            type="text"
            placeholder="Cari unit kerja..."
            class="w-full mb-6 px-4 py-3 rounded-xl border
                   focus:outline-none focus:ring"
          />

          <div
            id="results"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
          ></div>
        `;

        document
          .getElementById("searchInput")
          .addEventListener("input", handleSearch);

        renderResults("");
      }

      function handleSearch(e) {
        renderResults(e.target.value);
      }

      function renderResults(keyword) {
        const key = keyword.trim().toLowerCase();
        const units = unitsList.filter((unit) =>
          unit.toLowerCase().includes(key),
        );

        const container = document.getElementById("results");

        if (units.length === 0) {
          container.innerHTML = `
            <div class="text-gray-500 text-sm">
              Unit tidak ditemukan
            </div>
          `;
          return;
        }

        container.innerHTML = units
          .map(
            (unit) => `
            <div
              onclick="renderUnit('${unit}')"
              class="cursor-pointer rounded-2xl p-6
                     bg-white border
                     hover:shadow-md transition"
            >
              <div class="text-lg font-semibold">
                ${formatUnitName(unit)}
              </div>
            </div>
          `,
          )
          .join("");
      }

      /* =====================
         UNIT PAGE
      ===================== */
      function renderUnit(unit) {
        app.innerHTML = `
          <div class="flex items-center gap-3 mb-4">
            <button
              onclick="renderHome()"
              class="w-10 h-10 flex items-center justify-center
                     rounded-full border bg-white
                     hover:bg-gray-100 transition"
              aria-label="Kembali"
            >
              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5 text-gray-700"
                   fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 19l-7-7 7-7" />
              </svg>
            </button>

            <h1 class="text-xl font-semibold">
              ${formatUnitName(unit)}
            </h1>
          </div>

          <div class="space-y-3">
            ${(data[unit] || [])
              .map(
                (f) => `
              <a
                href="${f.link}"
                target="_blank"
                rel="noopener noreferrer"
                class="block p-4 rounded-xl bg-white
                       border hover:shadow transition"
              >
                ${f.name}
              </a>
            `,
              )
              .join("")}
          </div>
        `;
      }

      loginBtn.addEventListener("click", async () => {
        errorMsg.classList.add("hidden");
        setStatus("Login...", false);

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          errorMsg.classList.remove("hidden");
          setStatus("Email dan password wajib diisi.", true);
          return;
        }

        const { error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          errorMsg.classList.remove("hidden");
          setStatus(error.message || "Login gagal.", true);
          return;
        }

        onLogin();
      });

      logoutBtn.addEventListener("click", async () => {
        await supabase.auth.signOut();
        onLogout();
      });

      supabase.auth.onAuthStateChange((_event, session) => {
        if (session) {
          onLogin();
        } else {
          onLogout();
        }
      });

      (async () => {
        const sessionRes = await supabase.auth.getSession();
        if (sessionRes.data.session) {
          onLogin();
        }
      })();
    </script>
    
  </body>
</html>
