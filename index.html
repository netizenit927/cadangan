<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRINITRIX</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TRINITRIX" />
  <link rel="apple-touch-icon" href="/trinitrix.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
    }
    /* Expand/collapse animasi */
    .room-forms {
      transition: max-height .25s ease, opacity .2s ease;
      overflow: hidden;
    }
    .chevron { transition: transform .2s ease; }
    .chevron.open { transform: rotate(90deg); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

<!-- ============================================================
     HALAMAN LOGIN
     ============================================================ -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-blue-50 to-slate-100">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">TRINITRIX</h1>
      <p class="text-slate-500 text-sm mt-1">Masuk untuk melanjutkan</p>
    </div>

    <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-4 text-sm"></div>

    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
        <input id="loginUser" type="email" required autocomplete="email"
               class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition"
               placeholder="Masukkan email" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
        <div class="relative">
          <input id="loginPass" type="password" required autocomplete="current-password"
                 class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition pr-10"
                 placeholder="Masukkan password" />
          <button type="button" id="togglePass"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" id="loginBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-2.5 rounded-xl transition text-sm flex items-center justify-center gap-2">
        <span id="loginBtnText">Masuk</span>
        <svg id="loginSpinner" class="hidden w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
      </button>
    </form>
  </div>
</div>

<!-- ============================================================
     HALAMAN UTAMA
     ============================================================ -->
<div id="mainPage" class="hidden min-h-screen">

  <!-- HEADER -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm">
    <div class="max-w-3xl mx-auto px-4 h-14 flex items-center justify-between gap-3">
      <span class="text-lg font-bold tracking-tight text-slate-800 shrink-0">TRINITRIX</span>

      <!-- Search -->
      <div class="relative flex-1 max-w-xs">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
        <input id="globalSearch" type="text" placeholder="Cari..."
               autocomplete="off"
               class="w-full border border-slate-200 rounded-xl pl-9 pr-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50 transition" />
        <div id="searchDrop"
             class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden z-50 max-h-72 overflow-y-auto">
        </div>
      </div>

      <button onclick="logout()"
              class="text-xs px-3 py-2 rounded-xl border border-slate-200 bg-slate-50 hover:bg-slate-100 text-slate-600 transition flex items-center gap-1.5 shrink-0">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Keluar
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="max-w-3xl mx-auto px-4 py-5 pb-10">

    <!-- Skeleton -->
    <div id="roomSkeleton" class="space-y-3">
      <div class="skeleton h-14 rounded-2xl"></div>
      <div class="skeleton h-14 rounded-2xl"></div>
      <div class="skeleton h-14 rounded-2xl"></div>
      <div class="skeleton h-14 rounded-2xl"></div>
      <div class="skeleton h-14 rounded-2xl"></div>
    </div>

    <!-- Daftar ruangan -->
    <div id="roomList" class="hidden space-y-3"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden bg-white rounded-2xl border border-slate-200 p-10 text-center text-slate-400 text-sm">
      Belum ada kategori. Hubungi admin untuk menambahkan data.
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6 text-center text-red-600 text-sm">
      Gagal memuat data. Periksa koneksi internet.
    </div>

  </main>
</div>

<script>
  const SUPABASE_URL  = 'https://unzbfqobkrfzdsiahbju.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuemJmcW9ia3JmemRzaWFoYmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NjU1NTksImV4cCI6MjA5NjU0MTU1OX0.cxkJbokUdsmRyQGNS4xDRNx7XUf319PXlzOLdzfC0kM';
  const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let ROOMS = [];

  // ── Toggle password ──
  document.getElementById('togglePass').addEventListener('click', () => {
    const inp = document.getElementById('loginPass');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // ── Login ──
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const errBox   = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    const spinner  = document.getElementById('loginSpinner');

    errBox.classList.add('hidden');
    btn.disabled = true;
    spinner.classList.remove('hidden');

    try {
      const { data, error } = await _supa.auth.signInWithPassword({ email, password });
      if (error) throw new Error('Email atau password salah.');
      showMainPage();
    } catch (err) {
      errBox.textContent = err.message;
      errBox.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      spinner.classList.add('hidden');
    }
  });

  // ── Logout ──
  async function logout() {
    await _supa.auth.signOut();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
  }

  // ── Show main page ──
  function showMainPage() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    loadRooms();
  }

  // ── Load data ──
  async function loadRooms() {
    try {
      const [rRes, dRes] = await Promise.all([
        _supa.from('rooms').select('id,name,description').order('name', { ascending: true }),
        _supa.from('documents').select('id,room_id,title,url,category,sort_order')
             .eq('category','form').order('sort_order', { ascending: true })
      ]);

      if (rRes.error) throw rRes.error;
      if (dRes.error) throw dRes.error;

      ROOMS = (rRes.data || []).map(r => ({
        ...r,
        documents: (dRes.data || []).filter(d => d.room_id === r.id)
          .sort((a, b) => (a.sort_order||0) - (b.sort_order||0))
      }));

      renderRoomList();

    } catch (err) {
      document.getElementById('roomSkeleton').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
    }
  }

  // ── Render list ruangan ──
  function renderRoomList(filter = '') {
    const q = filter.toLowerCase().trim();
    const list = document.getElementById('roomList');
    const skeleton = document.getElementById('roomSkeleton');
    const empty = document.getElementById('emptyState');

    skeleton.classList.add('hidden');

    const filtered = ROOMS.filter(r => {
      if (!q) return true;
      return r.name.toLowerCase().includes(q) ||
             r.documents.some(d => d.title.toLowerCase().includes(q));
    });

    if (filtered.length === 0) {
      list.classList.add('hidden');
      empty.classList.remove('hidden');
      empty.textContent = q ? `Tidak ada hasil untuk "${q}"` : 'Belum ada kategori.';
      return;
    }

    empty.classList.add('hidden');
    list.classList.remove('hidden');

    list.innerHTML = filtered.map(room => {
      const formCount = room.documents.length;
      // highlight search di nama
      const displayName = q ? highlight(room.name, q) : esc(room.name);

      return `
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
          <!-- Header ruangan (klik untuk expand) -->
          <button type="button" onclick="toggleRoom('${room.id}')"
                  class="w-full flex items-center justify-between px-4 py-4 hover:bg-slate-50 transition text-left gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-9 h-9 rounded-xl bg-blue-100 flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                </svg>
              </div>
              <div class="min-w-0">
                <div class="font-semibold text-slate-800 text-sm truncate">${displayName}</div>
                <div class="text-xs text-slate-400 mt-0.5">${formCount} form</div>
              </div>
            </div>
            <svg id="chevron-${room.id}" class="chevron w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>

          <!-- List form (tersembunyi default) -->
          <div id="forms-${room.id}" class="room-forms max-h-0 opacity-0">
            ${formCount === 0
              ? `<div class="px-4 pb-4 text-xs text-slate-400 italic">Belum ada form di kategori ini.</div>`
              : `<div class="px-3 pb-3 space-y-2 border-t border-slate-100 pt-3">` +
                room.documents.map(doc => {
                  const titleDisplay = q ? highlight(doc.title, q) : esc(doc.title);
                  return `
                    <a href="${esc(doc.url)}" target="_blank" rel="noopener noreferrer"
                       class="flex items-center gap-3 px-3 py-3 rounded-xl border border-slate-200 hover:border-blue-300 hover:bg-blue-50 transition group active:scale-[0.98]">
                      <div class="w-7 h-7 rounded-lg bg-blue-100 flex items-center justify-center shrink-0">
                        <svg class="w-3.5 h-3.5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                      </div>
                      <span class="text-sm font-medium text-slate-700 group-hover:text-blue-700 transition leading-snug">${titleDisplay}</span>
                      <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-blue-400 transition ml-auto shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                      </svg>
                    </a>`;
                }).join('') +
                `</div>`
            }
          </div>
        </div>`;
    }).join('');
  }

  // ── Toggle expand ruangan ──
  const openRooms = new Set();

  function toggleRoom(roomId) {
    const forms   = document.getElementById('forms-' + roomId);
    const chevron = document.getElementById('chevron-' + roomId);
    if (!forms) return;

    if (openRooms.has(roomId)) {
      forms.style.maxHeight = '0';
      forms.style.opacity   = '0';
      chevron.classList.remove('open');
      openRooms.delete(roomId);
    } else {
      forms.style.maxHeight = forms.scrollHeight + 'px';
      forms.style.opacity   = '1';
      chevron.classList.add('open');
      openRooms.add(roomId);
    }
  }

  // ── Search ──
  (function () {
    const input = document.getElementById('globalSearch');
    const drop  = document.getElementById('searchDrop');
    const norm  = s => (s || '').toLowerCase().trim();

    input.addEventListener('input', function () {
      const q = norm(this.value);
      if (!q) { drop.classList.add('hidden'); renderRoomList(''); return; }

      // Tampilkan hasil di dropdown
      const results = [];
      ROOMS.forEach(room => {
        room.documents.forEach(doc => {
          if (norm(doc.title).includes(q) || norm(room.name).includes(q)) {
            results.push({ room, doc });
          }
        });
      });

      if (!results.length) {
        drop.innerHTML = `<div class="px-4 py-3 text-sm text-slate-400">Tidak ada hasil untuk "<strong>${esc(q)}</strong>"</div>`;
      } else {
        drop.innerHTML = results.slice(0, 10).map(r => `
          <a href="${esc(r.doc.url)}" target="_blank" rel="noopener noreferrer"
             class="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 border-b border-slate-100 last:border-b-0">
            <div class="min-w-0 flex-1">
              <div class="text-sm font-medium text-slate-700 truncate">${highlight(r.doc.title, q)}</div>
              <div class="text-xs text-slate-400 truncate">${esc(r.room.name)}</div>
            </div>
            <svg class="w-3.5 h-3.5 text-slate-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </a>`).join('');
      }
      drop.classList.remove('hidden');
    });

    document.addEventListener('click', e => {
      if (e.target !== input && !drop.contains(e.target)) drop.classList.add('hidden');
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') { drop.classList.add('hidden'); input.value = ''; renderRoomList(''); }
    });
  })();

  // ── Highlight text ──
  function highlight(text, q) {
    if (!q) return esc(text);
    const lower = text.toLowerCase();
    const idx   = lower.indexOf(q.toLowerCase());
    if (idx < 0) return esc(text);
    return esc(text.slice(0, idx))
         + `<mark class="bg-yellow-200 rounded">${esc(text.slice(idx, idx + q.length))}</mark>`
         + esc(text.slice(idx + q.length));
  }

  // ── Escape HTML ──
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──
  (async function init() {
    const { data: { session } } = await _supa.auth.getSession();
    if (session) showMainPage();
  })();

  // ── PWA service worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
</script>
</body>
</html>
