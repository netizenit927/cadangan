<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>TRINITRIX - RS Premier Jatinegara</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Smooth transition untuk loading */
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body class="bg-gray-100 text-gray-800">
    <nav class="fixed top-0 w-full z-40 bg-white border-b shadow-sm">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
        <img src="logo.jpeg" alt="Logo RS" class="w-10 h-10 object-contain" />
        <div class="leading-tight">
          <div class="font-semibold text-sm md:text-base">
            RS Premier Jatinegara
          </div>
          <div class="text-xs text-gray-500 tracking-wide">TRINITRIX</div>
        </div>
        <div class="ml-auto">
          <button
            id="logoutBtn"
            class="hidden px-4 py-2 rounded-lg border bg-white text-sm font-medium hover:bg-gray-50 transition active:scale-95"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <main class="pt-24 pb-10 px-4">
      <div id="app" class="max-w-5xl mx-auto hidden fade-in"></div>

      <div
        id="loading"
        class="hidden fixed inset-0 z-30 flex items-center justify-center bg-gray-100/50"
      >
        <div
          class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"
        ></div>
      </div>
    </main>

    <div
      id="loginModal"
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-4"
    >
      <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl fade-in">
        <div class="flex flex-col items-center mb-8">
          <img src="logo.jpeg" class="w-20 h-20 object-contain mb-4" />
          <h2 class="font-bold text-xl text-gray-900">RS Premier Jatinegara</h2>
          <p class="text-sm text-gray-500 mt-1">
            Sistem Monitoring <b>TRINITRIX</b>
          </p>
        </div>

        <div class="space-y-4">
          <div>
            <label
              class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1"
              >Email Unit</label
            >
            <input
              id="email"
              type="email"
              placeholder="contoh: unit@rspj.com"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition"
            />
          </div>
          <div>
            <label
              class="block text-xs font-semibold text-gray-500 uppercase ml-1 mb-1"
              >Password</label
            >
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl border focus:ring-2 focus:ring-blue-500 outline-none transition"
            />
          </div>

          <div
            id="statusMsg"
            class="text-sm text-gray-600 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2"
          >
            Silakan login untuk melanjutkan.
          </div>

          <button
            id="loginBtn"
            class="w-full py-3.5 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition active:scale-[0.98]"
          >
            Masuk Sekarang
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      (function () {
        let data = {};
        let unitsList = [];

        // Elements
        const app = document.getElementById("app");
        const modal = document.getElementById("loginModal");
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const statusMsg = document.getElementById("statusMsg");
        const loader = document.getElementById("loading");

        // Supabase Config
        const supabaseUrl = "https://puoawllonvaeufvkmcrd.supabase.co";
        const supabaseAnonKey =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1b2F3bGxvbnZhZXVmdmttY3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MTk2NjMsImV4cCI6MjA4NTQ5NTY2M30.SRPc4HT8jbjpIsbY4SeZFPCT0CGY84sfYsNJ58UUYLk";
        const supabase = window.supabase.createClient(
          supabaseUrl,
          supabaseAnonKey,
        );

        /* =====================
           CORE LOGIC
        ===================== */

        async function fetchUnits() {
          showLoader(true);
          try {
            const { data: units, error } = await supabase
              .from("units")
              .select("id, name, forms:forms(id, name, link, sort_order)")
              .order("name", { ascending: true })
              .order("sort_order", { foreignTable: "forms", ascending: true });

            if (error) throw error;

            data = (units || []).reduce((acc, unit) => {
              acc[unit.name] = unit.forms || [];
              return acc;
            }, {});
            unitsList = Object.keys(data);
          } catch (err) {
            setStatus("Gagal memuat data: " + err.message, true);
          } finally {
            showLoader(false);
          }
        }

        async function onLoginSuccess() {
          modal.classList.add("hidden");
          logoutBtn.classList.remove("hidden");
          app.classList.remove("hidden");

          await fetchUnits();
          renderHome();
        }

        function onLogoutSuccess() {
          app.classList.add("hidden");
          logoutBtn.classList.add("hidden");
          modal.classList.remove("hidden");
          setStatus("Berhasil logout.", false);
          document.getElementById("email").value = "";
          document.getElementById("password").value = "";
        }

        /* =====================
           UI RENDERING
        ===================== */

        window.renderHome = function () {
          app.innerHTML = `
            <div class="mb-8">
              <h1 class="text-2xl font-bold text-gray-900">Dashboard Unit</h1>
              <p class="text-gray-500">Pilih unit kerja untuk mengisi form laporan.</p>
            </div>
            <input
              id="searchInput"
              type="text"
              placeholder="Cari unit kerja..."
              class="w-full mb-8 px-5 py-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
            />
            <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
          `;

          document
            .getElementById("searchInput")
            .addEventListener("input", (e) => {
              renderResults(e.target.value);
            });

          renderResults("");
        };

        function renderResults(keyword) {
          const key = keyword.trim().toLowerCase();
          const filtered = unitsList.filter((u) =>
            u.toLowerCase().includes(key),
          );
          const container = document.getElementById("results");

          if (filtered.length === 0) {
            container.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">Unit tidak ditemukan</div>`;
            return;
          }

          container.innerHTML = filtered
            .map(
              (unit) => `
            <div onclick="renderUnit('${unit}')" class="group cursor-pointer rounded-2xl p-6 bg-white border border-transparent hover:border-blue-500 hover:shadow-xl transition-all duration-300">
              <div class="flex justify-between items-start">
                <div class="text-lg font-bold text-gray-800 group-hover:text-blue-600 transition-colors">${unit}</div>
                <div class="bg-blue-50 p-2 rounded-lg text-blue-600">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </div>
              </div>
              <div class="mt-2 text-sm text-gray-400">${data[unit].length} Form tersedia</div>
            </div>
          `,
            )
            .join("");
        }

        window.renderUnit = function (unitName) {
          app.innerHTML = `
            <div class="flex items-center gap-4 mb-8">
              <button onclick="renderHome()" class="p-3 rounded-xl bg-white border hover:bg-gray-50 transition active:scale-90 shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              </button>
              <div>
                <h1 class="text-2xl font-bold text-gray-900">${unitName}</h1>
                <p class="text-gray-500 text-sm">Silakan pilih jenis laporan di bawah ini</p>
              </div>
            </div>
            <div class="grid gap-4">
              ${(data[unitName] || [])
                .map(
                  (f) => `
                <a href="${f.link}" target="_blank" rel="noopener" 
                   class="flex items-center justify-between p-5 rounded-2xl bg-white border border-gray-100 hover:border-blue-300 hover:shadow-md transition-all group">
                  <span class="font-medium text-gray-700 group-hover:text-blue-700">${f.name}</span>
                  <svg class="w-5 h-5 text-gray-300 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
              `,
                )
                .join("")}
            </div>
          `;
        };

        /* =====================
           EVENTS & AUTH
        ===================== */

        loginBtn.addEventListener("click", async () => {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password) {
            setStatus("Email dan password wajib diisi.", true);
            return;
          }

          setStatus("Mengecek kredensial...", false);
          const { error } = await supabase.auth.signInWithPassword({
            email,
            password,
          });

          if (error) {
            setStatus(error.message, true);
          }
        });

        logoutBtn.addEventListener("click", async () => {
          await supabase.auth.signOut();
        });

        supabase.auth.onAuthStateChange((event, session) => {
          if (session) {
            onLoginSuccess();
          } else {
            onLogoutSuccess();
          }
        });

        // Helpers
        function setStatus(msg, isError) {
          statusMsg.textContent = msg;
          statusMsg.className = `text-sm rounded-lg px-3 py-2 border ${isError ? "text-red-600 bg-red-50 border-red-200" : "text-gray-600 bg-gray-50 border-gray-200"}`;
        }

        function showLoader(show) {
          loader.classList.toggle("hidden", !show);
        }
      })();
    </script>
  </body>
</html>
