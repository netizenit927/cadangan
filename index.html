      const app = document.getElementById("app");
      const modal = document.getElementById("loginModal");
      const errorMsg = document.getElementById("errorMsg");

      /* =====================
         HELPER
      ===================== */
      function formatUnitName(text) {
        return text.replace(/([a-z])([A-Z])/g, "$1 $2");
      }

      /* =====================
         LOGIN
      ===================== */
      function login() {
        if (
          document.getElementById("username").value === "guard" &&
          document.getElementById("password").value === "guard@01"
        ) {
          modal.classList.add("hidden");
          app.classList.remove("hidden");
          renderHome();
        } else {
          errorMsg.classList.remove("hidden");
        }
      }

      /* =====================
         HOME + SEARCH
      ===================== */
      function renderHome() {
        app.innerHTML = `
          <input
            id="searchInput"
            type="text"
            placeholder="Cari unit kerja..."
            class="w-full mb-6 px-4 py-3 rounded-xl border
                   focus:outline-none focus:ring"
          />

          <div
            id="results"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
          ></div>
        `;

        document
          .getElementById("searchInput")
          .addEventListener("input", handleSearch);

        renderResults("");
      }

      function handleSearch(e) {
        renderResults(e.target.value);
      }

      function renderResults(keyword) {
        const units = Object.keys(data).filter((unit) =>
          unit.toLowerCase().includes(keyword.toLowerCase()),
        );

        const container = document.getElementById("results");

        if (units.length === 0) {
          container.innerHTML = `
            <div class="text-gray-500 text-sm">
              Unit tidak ditemukan
            </div>
          `;
          return;
        }

        container.innerHTML = units
          .map(
            (unit) => `
            <div
              onclick="renderUnit('${unit}')"
              class="cursor-pointer rounded-2xl p-6
                     bg-white border
                     hover:shadow-md transition"
            >
              <div class="text-lg font-semibold">
                ${formatUnitName(unit)}
              </div>
            </div>
          `,
          )
          .join("");
      }

      /* =====================
         UNIT PAGE
      ===================== */
      function renderUnit(unit) {
        app.innerHTML = `
          <div class="flex items-center gap-3 mb-4">
            <button
              onclick="renderHome()"
              class="w-10 h-10 flex items-center justify-center
                     rounded-full border bg-white
                     hover:bg-gray-100 transition"
              aria-label="Kembali"
            >
              <svg xmlns="http://www.w3.org/2000/svg"
                   class="w-5 h-5 text-gray-700"
                   fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M15 19l-7-7 7-7" />
              </svg>
            </button>

            <h1 class="text-xl font-semibold">
              ${formatUnitName(unit)}
            </h1>
          </div>

          <div class="space-y-3">
            ${data[unit]
              .map(
                (f) => `
              <a
                href="${f.link}"
                target="_blank"
                class="block p-4 rounded-xl bg-white
                       border hover:shadow transition"
              >
                ${f.name}
              </a>
            `,
              )
              .join("")}
          </div>
        `;
      }
